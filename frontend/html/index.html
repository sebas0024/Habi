<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="../styles/style.css">
    <meta charset="UTF-8">
    <title>Habi - Buscador de Propiedades</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <!-- Navbar principal -->
    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Habi Propiedades</span>
        </div>
    </nav>

    <div class="container">
        <!-- Card de filtros de búsqueda -->
        <div class="card mb-4 p-3 shadow-sm">
            <div class="row g-3">

                <!-- Filtro por ciudad -->
                <div class="col-md-4">
                    <input type="text" id="filtro-ciudad" class="form-control" placeholder="Ciudad (ej. bogota)">
                </div>

                <!-- Filtro por año -->
                <div class="col-md-3">
                    <input type="number" id="filtro-ano" class="form-control" placeholder="Año de construcción">
                </div>

                <!-- Filtro por estado -->
                <div class="col-md-3">
                    <select id="filtro-estado" class="form-select">
                        <option value="">Estado (Todos)</option>
                        <option value="pre_venta">Pre-venta</option>
                        <option value="en_venta">En venta</option>
                        <option value="vendido">Vendido</option>
                    </select>
                </div>

                <!-- Botón de búsqueda -->
                <div class="col-md-2">
                    <button onclick="buscar()" class="btn btn-success w-100">Buscar</button>
                </div>
            </div>
        </div>

        <!-- Contenedor donde se renderizan las propiedades dinámicamente -->
        <div id="contenedor-propiedades" class="row row-cols-1 row-cols-md-3 g-4"></div>
    </div>

    <!-- Scripts -->
    <script src="../js/script.js"></script>
    <script src="../js/img.js"></script>
</body>
</html>
